name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Bump version and sync manifest
        run: |
          npm pkg set version=$VERSION
          node scripts/sync-manifest.js

      - name: Install dependencies
        run: npm install

      - name: Build and pack
        run: npm run pack

      - name: Create release with pack
        run: |
          PACK_FILE=$(ls dist/*.lumenpack | head -1)
          gh release create "$GITHUB_REF_NAME" "$PACK_FILE" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json
          git diff --staged --quiet || git commit -m "chore: bump version to $VERSION [skip ci]"
          git push origin main
